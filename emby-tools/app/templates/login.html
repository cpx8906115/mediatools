{% extends "_layout_min.html" %}
{% block content %}
  <div class="w-full bg-slate-900 border border-slate-800 rounded-xl p-6">
    <h1 class="text-xl font-semibold">mediatools</h1>
    <p class="text-sm text-slate-400 mt-1">请输入账号与密码</p>

    {% if request.query_params.get('bad') %}
      <div class="mt-4 text-sm text-red-300">账号或密码不正确</div>
    {% endif %}

    <form class="mt-4 space-y-3" method="post" action="/login">
      <input name="username" class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" placeholder="账号" />
      <input name="password" type="password" class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" placeholder="密码" />
      <button class="w-full px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500">登录</button>
    </form>

    <div class="mt-4 text-xs text-slate-500">
      默认账号：<span class="font-mono">admin</span>（可在「修改密码」页面同时修改）
    </div>
  </div>
{% endblock %}
