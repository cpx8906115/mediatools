{% extends "_layout.html" %}
{% block content %}
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">库增长</h1>
      <div class="text-sm text-slate-400">每日快照</div>
    </div>
  </div>

  {% if msg %}
    <div class="mt-4 text-sm {% if err %}text-red-300{% else %}text-green-300{% endif %}">{{ msg }}</div>
  {% endif %}

  <div class="mt-4">
    <form method="post" action="/growth/snapshot">
      <button class="px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm">立即抓取快照</button>
    </form>
  </div>

  <div class="mt-6 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
    <div class="grid grid-cols-12 gap-2 px-4 py-2 text-xs text-slate-400 border-b border-slate-800">
      <div class="col-span-3">日期（UTC）</div>
      <div class="col-span-3">总量</div>
      <div class="col-span-3">较前一日增量</div>
      <div class="col-span-3">更新时间</div>
    </div>
    {% for r in rows %}
      <div class="grid grid-cols-12 gap-2 px-4 py-2 text-sm border-b border-slate-800 last:border-b-0">
        <div class="col-span-3 font-mono">{{ r.day }}</div>
        <div class="col-span-3">{{ r.total_items }}</div>
        <div class="col-span-3">{{ r.delta_items }}</div>
        <div class="col-span-3 text-xs text-slate-400">{{ r.updated_at }}</div>
      </div>
    {% endfor %}

    {% if rows|length == 0 %}
      <div class="px-4 py-6 text-sm text-slate-400">暂无快照（可以点上面的按钮手动抓取一次）。</div>
    {% endif %}
  </div>
{% endblock %}
