{% extends "_layout.html" %}
{% block content %}
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">账号与密码</h1>
      <div class="text-sm text-slate-400">修改登录账号与密码（默认账号：admin）</div>
    </div>
  </div>

  {% if msg %}
    <div class="mt-4 text-sm {% if err %}text-red-300{% else %}text-green-300{% endif %}">{{ msg }}</div>
  {% endif %}

  <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4">

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
      <div class="text-sm font-semibold text-slate-200">修改账号</div>
      <div class="mt-1 text-xs text-slate-500">无需密码确认（按你的要求简化）</div>
      <form class="mt-4 space-y-3" method="post" action="/password/username">
        <div>
          <div class="text-sm text-slate-300">新账号</div>
          <input name="new_username" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" placeholder="admin" />
          <div class="mt-1 text-xs text-slate-500">立即生效；下次登录使用新账号。</div>
        </div>
        <button class="w-full px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500">保存账号</button>
      </form>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
      <div class="text-sm font-semibold text-slate-200">修改密码</div>
      <div class="mt-1 text-xs text-slate-500">需要当前账号与密码确认</div>
      <form class="mt-4 space-y-3" method="post" action="/password/password">
        <div>
          <div class="text-sm text-slate-300">当前账号</div>
          <input name="current_username" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" placeholder="admin" />
        </div>
        <div>
          <div class="text-sm text-slate-300">当前密码</div>
          <input name="current_password" type="password" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" />
        </div>
        <div class="pt-2 border-t border-slate-800"></div>
        <div>
          <div class="text-sm text-slate-300">新密码</div>
          <input name="new_password" type="password" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" />
        </div>
        <div>
          <div class="text-sm text-slate-300">确认新密码</div>
          <input name="confirm_password" type="password" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" />
        </div>
        <button class="w-full px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500">保存密码</button>
      </form>
    </div>

  </div>
{% endblock %}
