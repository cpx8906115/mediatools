{% extends "_layout.html" %}
{% block content %}
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">任务中心</h1>
      <div class="text-sm text-slate-400">入队 / 分流 / 执行日志</div>
    </div>
  </div>

  <div class="mt-6 bg-slate-900 border border-slate-800 rounded-xl p-4">
    <div class="text-sm text-slate-300 font-semibold">新建任务（MVP）</div>
    <form class="mt-3 grid grid-cols-1 md:grid-cols-12 gap-3" method="post" action="/tasks/new">
      <div class="md:col-span-3">
        <div class="text-xs text-slate-400">类型</div>
        <select name="kind" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-sm">
          <option value="tg_message">tg_message（TG消息/链接）</option>
          <option value="transfer">transfer（转存）</option>
          <option value="organize">organize（整理）</option>
          <option value="strm">strm（生成STRM）</option>
          <option value="emby_refresh">emby_refresh（刷新Emby）</option>
        </select>
      </div>
      <div class="md:col-span-4">
        <div class="text-xs text-slate-400">标题</div>
        <input name="title" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-sm" placeholder="任务标题" />
      </div>
      <div class="md:col-span-5">
        <div class="text-xs text-slate-400">Payload JSON</div>
        <input name="payload_json" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800 text-sm font-mono" placeholder='{"foo":"bar"}' />
      </div>
      <div class="md:col-span-12">
        <button class="px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm">创建</button>
      </div>
    </form>
  </div>

  <div class="mt-6 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
    <div class="grid grid-cols-12 gap-2 px-4 py-2 text-xs text-slate-400 border-b border-slate-800">
      <div class="col-span-1">ID</div>
      <div class="col-span-2">类型</div>
      <div class="col-span-2">状态</div>
      <div class="col-span-7">标题</div>
    </div>
    {% for t in tasks %}
      <a href="/tasks/{{ t.id }}" class="grid grid-cols-12 gap-2 px-4 py-3 text-sm border-b border-slate-800 last:border-b-0 hover:bg-slate-950">
        <div class="col-span-1 font-mono">{{ t.id }}</div>
        <div class="col-span-2 text-slate-300">{{ t.type }}</div>
        <div class="col-span-2">
          <span class="px-2 py-0.5 rounded text-xs border border-slate-700 {% if t.status == 'success' %}bg-emerald-950 text-emerald-200{% elif t.status == 'failed' %}bg-red-950 text-red-200{% elif t.status == 'running' %}bg-indigo-950 text-indigo-200{% else %}bg-slate-950 text-slate-200{% endif %}">{{ t.status }}</span>
        </div>
        <div class="col-span-7 text-slate-200 line-clamp-1">{{ t.title }}</div>
      </a>
    {% endfor %}
    {% if tasks|length == 0 %}
      <div class="px-4 py-6 text-sm text-slate-400">暂无任务。</div>
    {% endif %}
  </div>
{% endblock %}
