{% extends "_layout_min.html" %}
{% block content %}
  <div class="w-full bg-slate-900 border border-slate-800 rounded-xl p-6">
    <h1 class="text-xl font-semibold">Emby Inspector</h1>
    <p class="text-sm text-slate-400 mt-1">请输入访问密码</p>

    {% if request.query_params.get('bad') %}
      <div class="mt-4 text-sm text-red-300">密码不正确</div>
    {% endif %}

    <form class="mt-4 space-y-3" method="post" action="/login">
      <input name="password" type="password" class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" placeholder="Password" />
      <button class="w-full px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500">登录</button>
    </form>
  </div>
{% endblock %}
