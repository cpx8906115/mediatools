{% extends "_layout.html" %}
{% block content %}
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">修改密码</h1>
      <div class="text-sm text-slate-400">修改 emby-inspector 登录密码</div>
    </div>
  </div>

  {% if msg %}
    <div class="mt-4 text-sm {% if err %}text-red-300{% else %}text-green-300{% endif %}">{{ msg }}</div>
  {% endif %}

  <div class="mt-6 bg-slate-900 border border-slate-800 rounded-xl p-4">
    <form class="space-y-4" method="post" action="/password">
      <div>
        <div class="text-sm text-slate-300">旧密码</div>
        <input name="old" type="password" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" />
      </div>
      <div>
        <div class="text-sm text-slate-300">新密码</div>
        <input name="new" type="password" class="mt-1 w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-800" />
      </div>
      <button class="px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500">保存</button>
    </form>
  </div>
{% endblock %}
